name: SingScoringDemo
options:
  bundleIdPrefix: com.sensen.singscoring
  deploymentTarget:
    iOS: "15.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.0"
    ENABLE_BITCODE: NO

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.19

targets:
  SingScoringDemo:
    type: application
    platform: iOS
    sources:
      - path: SingScoringDemo
    info:
      path: SingScoringDemo/Info.plist
      properties:
        CFBundleDisplayName: SingScoring Demo
        NSMicrophoneUsageDescription: Used to record your singing and score it against the reference melody.
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSExceptionDomains:
            210.22.95.26:
              NSExceptionAllowsInsecureHTTPLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sensen.singscoring.demo
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - framework: ../build-ios/SingScoring.xcframework
        embed: true
        codeSign: true
      - package: ZIPFoundation
