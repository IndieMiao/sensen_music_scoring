name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  desktop-tests:
    name: Desktop core (Ubuntu, ctest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Cache GoogleTest FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: gtest-${{ runner.os }}-v1.14.0

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  android-build:
    name: Android AAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install NDK 27.3
        run: |
          set -e
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "ndk;27.3.13750724" >/dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.3.13750724" >> "$GITHUB_ENV"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build AAR
        run: ./gradlew :singscoring:assembleDebug --no-daemon --stacktrace

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: singscoring-debug-aar
          path: bindings/android/build/outputs/aar/*.aar
          if-no-files-found: error
